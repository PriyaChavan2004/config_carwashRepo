server.port=8080

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-CAR-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/users/**

# CAR SERVICE
spring.cloud.gateway.routes[1].id=car-service
spring.cloud.gateway.routes[1].uri=lb://CAR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/cars/**

# ORDER SERVICE
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**

# PAYMENT SERVICE
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payments/**
