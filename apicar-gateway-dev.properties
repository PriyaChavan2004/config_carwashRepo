server.port=8080

# USER SERVICE - PUBLIC
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://USER-CAR-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# USER SERVICE - PROTECTED
spring.cloud.gateway.routes[1].id=user-service-secure
spring.cloud.gateway.routes[1].uri=lb://USER-CAR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

# ADMIN ROUTE
spring.cloud.gateway.routes[2].id=admin-route
spring.cloud.gateway.routes[2].uri=lb://USER-CAR-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/**
